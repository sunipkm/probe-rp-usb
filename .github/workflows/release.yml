# Publish a GitHub Release.
#
# Triggered by pushing a version tag (e.g. `git tag v0.1.0 && git push --tags`).
# Delegates all compilation to build.yml via workflow_call, then collects the
# uploaded artifacts and attaches them to the release.

name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  # ── Build all targets (reuses build.yml — no matrix duplication) ─────────────
  build:
    uses: ./.github/workflows/build.yml

  # ── Create GitHub Release and upload all assets ──────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: List release assets
        run: find dist -type f | sort

      # A tag is a pre-release if it contains any letter after the version
      # numbers: v0.0.1-pre0, v0.0.1a, v0.0.1-rc1, v0.0.1-beta2, …
      # Pure numeric suffixes (v0.0.1-10) are treated as regular releases.
      - name: Detect pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$ ]]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.value == 'true' }}
          generate_release_notes: true
          files: |
            dist/*
            probe-rp-usb-installer.sh
            probe-rp-usb-installer.ps1
            99-probe-rp-usb.rules
