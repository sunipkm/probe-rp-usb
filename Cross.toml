# Cross.toml — configuration for the `cross` cross-compilation tool.
#
# The aarch64-unknown-linux-gnu target requires `libudev-dev` for the ARM64
# sysroot because `serialport` (with the `usbportinfo-interface` feature) and
# `nusb` both link against libudev at runtime.
#
# `pre-build` commands run inside the cross Docker image before the build.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update -q",
    "apt-get install -y libudev-dev:arm64",
]
